  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: Ledgera-windows-signed
  #         path: artifacts/Ledgera-windows-signed.exe

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          cp artifacts/Ledgera-windows.exe/Ledgera-windows.exe release/ || true
          cp artifacts/Ledgera-mac.dmg/Ledgera-mac.dmg release/ || true
          cp artifacts/Ledgera-linux.AppImage/Ledgera-linux.AppImage release/ || true
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
